name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build release binaries
        working-directory: drift
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Generate shell completions
        working-directory: drift
        run: |
          mkdir -p completions

          # drift completions
          ./target/x86_64-unknown-linux-gnu/release/drift completions bash > completions/drift.bash
          ./target/x86_64-unknown-linux-gnu/release/drift completions zsh  > completions/_drift
          ./target/x86_64-unknown-linux-gnu/release/drift completions fish > completions/drift.fish

          # driftd / drift-ctl completions
          ./target/x86_64-unknown-linux-gnu/release/driftd completions bash > completions/driftd.bash
          ./target/x86_64-unknown-linux-gnu/release/driftd completions zsh  > completions/_driftd
          ./target/x86_64-unknown-linux-gnu/release/driftd completions fish > completions/driftd.fish

      - name: Package tar.gz
        working-directory: drift
        run: |
          TAG=${GITHUB_REF_NAME}
          ARCH=x86_64-unknown-linux-gnu
          PKG=drift-${TAG}-${ARCH}

          mkdir -p "${PKG}/completions"

          cp target/${ARCH}/release/drift   "${PKG}/"
          cp target/${ARCH}/release/driftd  "${PKG}/"
          cp completions/*                  "${PKG}/completions/"
          cp ../README.md                   "${PKG}/"

          tar -czf "${PKG}.tar.gz" "${PKG}"
          echo "PKG=${PKG}" >> $GITHUB_ENV

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: drift/${{ env.PKG }}.tar.gz
          generate_release_notes: true
